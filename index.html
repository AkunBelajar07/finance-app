<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Advanced</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto p-4">

  <h1 class="text-2xl font-bold text-center mb-4">💰 Finance Advanced</h1>

  <!-- Ringkasan -->
  <div class="grid grid-cols-2 gap-2 mb-4">
    <div class="bg-green-100 p-3 rounded-xl text-center">
      <p>Pemasukan</p>
      <h2 id="totalMasuk">Rp 0</h2>
    </div>
    <div class="bg-red-100 p-3 rounded-xl text-center">
      <p>Pengeluaran</p>
      <h2 id="totalKeluar">Rp 0</h2>
    </div>
  </div>

  <!-- Saldo -->
  <div class="bg-white p-4 rounded-xl shadow text-center mb-4">
    <h2 id="saldo" class="text-2xl font-bold">Rp 0</h2>
  </div>

  <!-- Search & Filter -->
  <input id="search" placeholder="Cari transaksi..."
    class="w-full p-2 mb-2 border rounded-lg">

  <input id="filterTanggal" type="date"
    class="w-full p-2 mb-4 border rounded-lg">

  <!-- ✅ FORM (SUDAH BENAR) -->
  <div id="formContainer" class="bg-white p-4 rounded-xl shadow mb-4 space-y-2">

    <input id="deskripsi" placeholder="Deskripsi" class="w-full p-2 border rounded-lg">

    <input id="jumlah" type="number" placeholder="Jumlah" class="w-full p-2 border rounded-lg">

    <select id="kategori" class="w-full p-2 border rounded-lg">
      <option>Makan</option>
      <option>Transport</option>
      <option>Hiburan</option>
      <option>Lainnya</option>
    </select>

    <input id="tanggal" type="date" class="w-full p-2 border rounded-lg">

    <select id="jenis" class="w-full p-2 border rounded-lg">
      <option value="pemasukan">Pemasukan</option>
      <option value="pengeluaran">Pengeluaran</option>
    </select>

    <button id="btnSimpan" class="w-full bg-blue-500 text-white p-2 rounded-lg">
      Simpan
    </button>

  </div>

  <!-- Chart -->
  <div class="bg-white p-4 rounded-xl shadow mb-4">
    <canvas id="chart"></canvas>
  </div>

  <!-- List -->
  <div id="list" class="space-y-2"></div>

</div>

<!-- ✅ HANYA INI (JANGAN DOUBLE) -->
<script type="module" src="script.js"></script>

</body>
</html>
